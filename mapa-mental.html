# Análisis Conceptual · Parcial 1

## 1. Wolton + Everett + Quino
### Comunicación (Wolton)
- No se reduce a una sola cosa
- Fenómeno social complejo
- 4 dimensiones complementarias
  - Ideal de expresión e intercambio
    - Origen de la cultura occidental
    - Base de la democracia
    - Individuos libres e iguales
  - Conjunto de medios masivos
    - Prensa, radio, TV
    - Trastocaron la relación sociedad-comunicación
  - Nuevas técnicas
    - Informática, telecom, audiovisuales
    - Modificaron las reglas globales
  - Valores y símbolos del espacio público
    - Información, encuestas, retórica
    - Permiten representarse y actuar
- Información ↔ Comunicación
  - Son inseparables
  - Mismo sistema (modernidad, Occidente, democracia)

### Cultura
- Definición (TP corregido)
  - "Conjunto de significados, creaciones y estilos de vida"
  - Otorga identidad
  - Genera sentido de pertenencia
- 3 sentidos clásicos
  - Sentido francés
    - Creación, obra y patrimonio
    - Saber y conocimiento
  - Sentido alemán
    - Idea de civilización
    - Valores, representaciones, símbolos
  - Sentido anglosajón
    - Mirada antropológica
    - Estilo de vida, costumbres, mitos

### Relación comunicación-cultura
- Directa y prácticamente inseparable
- La comunicación
  - Transporta la cultura
  - La transmite generación tras generación
  - La transforma
- Hoy en día
  - Medios y nuevas tecnologías
  - Movilizan valores y estilos de vida
  - No hay cultura sin comunicación
- Puente o muros
  - Puente para relaciones humanas
  - Muros cuando faltan códigos compartidos
  - Caso "El desencanto del extranjero"
    - Existe intercambio
    - Falla por desconexión de códigos
    - Genera relatos paralelos

### Daniel Everett (artículo)
- Lenguaje = artefacto creado por la cultura
- Tribu pirahã
- 3 sufijos
  - "Lo vi con mis propios ojos"
  - "Alguien me contó eso"
  - "Yo digo esto basándome en evidencias"
- Niveles de certeza
- Valor cultural del "cuidado"
  - Vital presentar pruebas de lo dicho

### Quino (historietas)
- Lenguaje como barrera cultural
- Hay comunicación directa
- El mensaje llega con fluidez
- El código y simbolismo no se comprenden
- No en todas sus dimensiones

## 2. Saussure
### Lenguaje
- Facultad humana general
- Multiforme y heteróclito
- 3 aspectos
  - Físico (voz y sonido)
  - Fisiológico (órganos del habla)
  - Psíquico (ideas, imágenes mentales, significado)
- 2 dimensiones
  - Individual
  - Social
- No clasificable en una sola categoría

### Lengua
- Producto social de la facultad
- Totalitaria
  - Todos la usamos por igual
  - No es individual sino comunitaria
- Conjunto de convenciones
- Sistema de signos
- Exterior al individuo
- Caracteres
  - Objeto bien definido
  - Se puede estudiar separadamente
  - Homogénea (sentido + imagen acústica)
  - Concreta (cerebro, escritura la fija)

### Habla (parole)
- Ejecución de la lengua
- Acto individual
- De voluntad e inteligencia
- Cada individuo es el único árbitro
- Características
  - Combinaciones personales
    - Fórmula y estructura del hablante
    - Usa el código de la lengua
    - Para expresar su pensamiento
  - Mecanismo psicofísico
    - Proceso de expresar lo que piensa
    - Combinaciones como la fonación

### Signo lingüístico
- Entidad psíquica
- 2 caras inseparables
  - Significante
    - Forma sonora (imagen acústica)
    - "Lo que escuchamos"
    - Ej: la palabra "árbol" como sonido
  - Significado
    - Idea o concepto mental
    - "Lo que imaginamos"
    - Ej: la imagen mental del árbol
- Características
  - Arbitrario
    - Convención (árbol / tree / arbre)
  - Lineal
    - Significante se desarrolla en el tiempo
  - Inmutable y mutable
    - Individuo no puede cambiarlo
    - Comunidad sí, con el tiempo

### Semiología
- Ciencia general de los signos
- Vida de los signos en la vida social
- Lingüística = parte de ella

## 3. Oralidad y Escritura
### Escritura
- Palabras más precisas
- Comunicación diferida y a distancia
  - En ausencia del destinatario
- Comunicación elaborada
  - Se puede corregir y modificar
- Canal visual (lectura)
- Se respetan más las normas lingüísticas
- Comunicación duradera
  - Lo escrito perdura
- Solo códigos verbales (palabras)
- No hay interacción
  - No se conoce la reacción real
- Requiere enseñanza sistemática (escuela)
- Sin gestos ni entonación

### Oralidad
- Palabras no tan precisas
- Comunicación inmediata
  - En el tiempo y el espacio
  - Lo más rápido y ágil
- Comunicación espontánea
  - Se puede modificar pero no borrar
- Canal auditivo
- No se tienen tanto en cuenta las normas
- Comunicación efímera
  - Los sonidos duran y desaparecen
- Códigos verbales + no verbales
  - Gestos, señas, muecas
- Emisor y receptor presentes
  - Hay intercambio
- Aprendizaje en intercambios cotidianos
- Apoyada en gestos y entonación

## 4. Bajtín. Géneros discursivos
### Concepto
- Enunciados estables
- Relacionados con cada esfera del uso de la lengua
- Cada esfera elabora los suyos
- Diversidad inagotable

### Características
- Muy variados
- Dependen de la actividad humana
- Heterogéneos (orales o escritos)
- Desde diálogos cotidianos hasta textos literarios

### Clasificación
- Primarios
  - Comunicación informal
  - Familiaridad y confianza entre emisor y receptor
  - Poco elaborados
  - Mayormente orales (no siempre)
  - Enriquecen al género secundario
- Secundarios
  - Sociedades con comunicación desarrollada
  - Lenguaje cuidado y elaborado
  - Textos formales
  - Se proveen de los primarios
  - Convertidos en acontecimiento artístico

### 3 elementos del enunciado
- Tema
- Estilo
- Composición

### Idea fuerza
- Unidad real de la comunicación
- = el enunciado, no la oración

## 5. Competencias comunicativas
### Definición
- Conjunto de habilidades y conocimientos
- Para comunicarnos en situaciones reales
- Según las reglas
  - De la sociedad
  - De la cultura y contexto
  - Lingüísticas del grupo o comunidad de habla

### 5 sub-competencias
- Lingüística
  - Capaz de formar oraciones correctas
- Discursiva
  - Elegir tipo de texto adecuado a la situación
- Textual
  - Organizar coherentemente un texto
- Pragmática
  - Lograr un efecto intencional con el texto
- Enciclopédica
  - Conocimiento del mundo
  - Conjunto de saberes
  - Cultura general
